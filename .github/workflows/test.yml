name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov requests aiohttp pyyaml

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=src/task_router --cov-report=term-missing --cov-report=xml \
            --cov-fail-under=40

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check src/task_router/ --select E,F,W --ignore E501,E402,F541

      - name: Ruff format check
        run: ruff format src/task_router/ --check --diff || true

      - name: Syntax check
        run: python -m py_compile src/task_router/task_router.py
